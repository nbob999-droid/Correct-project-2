<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap & Earn Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0b0f1a; color: white; user-select: none; overflow: hidden; }
        .tab-content { display: none; height: 80vh; overflow-y: auto; }
        .tab-content.active { display: block; }
        .coin-glow { filter: drop-shadow(0 0 15px rgba(234, 179, 8, 0.4)); }
        .plus-animation { position: absolute; color: #fbbf24; font-weight: bold; pointer-events: none; animation: floatUp 0.8s ease-out forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center bg-gray-900 shadow-xl">
        <div class="flex items-center gap-2">
            <div id="pfp" class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold">?</div>
            <div>
                <p id="user-name" class="text-sm font-bold text-blue-400">Loading...</p>
                <p class="text-[10px] text-yellow-500">Level <span id="level">1</span></p>
            </div>
        </div>
        <div class="text-right">
            <p id="balance" class="text-xl font-black text-yellow-500">0</p>
            <p class="text-[8px] text-gray-500 tracking-widest uppercase">Total Coins</p>
        </div>
    </header>

    <main class="p-4 pb-24">
        <section id="tap" class="tab-content active flex flex-col items-center justify-center">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" 
                 class="w-56 h-56 coin-glow active:scale-90 transition-transform cursor-pointer" 
                 onclick="handleTap(event)">
            <p class="mt-8 text-gray-500 text-sm">Tap the USDT to mine!</p>
        </section>

        <section id="tasks" class="tab-content">
            <h2 class="text-xl font-bold mb-4">Earning Tasks</h2>
            <div id="task-list" class="space-y-3"></div>
            
            <div class="mt-8 bg-gray-900 p-4 rounded-2xl border border-gray-800">
                <h3 class="font-bold text-blue-400 mb-1">Referral Program 👥</h3>
                <p class="text-xs text-gray-500 mb-3">Earn 500 coins for every friend you invite!</p>
                <input id="ref-link" readonly class="w-full bg-black p-2 rounded text-[10px] text-gray-400 border border-gray-800">
                <button onclick="copyRef()" class="w-full bg-blue-600 mt-2 py-2 rounded-lg font-bold text-sm">Copy Link</button>
            </div>
        </section>

        <section id="wallet" class="tab-content">
            <h2 class="text-xl font-bold mb-4">Withdraw</h2>
            <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800">
                <input id="wallet-addr" type="text" placeholder="USDT BEP20 Address" class="w-full bg-black p-3 rounded-lg mb-4 text-sm outline-none border border-gray-800">
                <button onclick="requestWithdrawal()" class="w-full bg-green-600 font-bold py-3 rounded-xl shadow-lg">Submit Request</button>
            </div>
            <div id="history" class="mt-6 space-y-2"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-gray-900 p-4 flex justify-around border-t border-gray-800">
        <button onclick="showTab('tap')" class="text-xs">⛏️ Tap</button>
        <button onclick="showTab('tasks')" class="text-xs">📋 Tasks</button>
        <button onclick="showTab('wallet')" class="text-xs">💰 Wallet</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyCGdkUpsCg2p13imTYQtYpGmn7QCEKgUsA",
  authDomain: "telegram-bot-b2b8b.firebaseapp.com",
  projectId: "telegram-bot-b2b8b",
  storageBucket: "telegram-bot-b2b8b.firebasestorage.app",
  messagingSenderId: "303764184325",
  appId: "1:303764184325:web:2b571cb0e378642bc92b6c"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        const uid = tg.initDataUnsafe.user?.id.toString() || "dev_user";

        let user = { coins: 0, level: 1, name: tg.initDataUnsafe.user?.first_name || "Guest" };

        async function init() {
            const uRef = doc(db, "users", uid);
            const snap = await getDoc(uRef);
            
            if(snap.exists()) {
                user = snap.data();
            } else {
                // Check for referral reward
                const urlParams = new URLSearchParams(window.location.search);
                const inviterId = urlParams.get('start');
                if(inviterId) await giveReferralReward(inviterId);
                
                await setDoc(uRef, { ...user, id: uid });
            }

            document.getElementById('user-name').innerText = user.name;
            document.getElementById('pfp').innerText = user.name[0];
            document.getElementById('ref-link').value = "https://t.me/YourBot?start=" + uid;
            updateUI();
            syncTasks();
            syncHistory();
        }

        async function giveReferralReward(inviterId) {
            const inviterRef = doc(db, "users", inviterId);
            const inviterSnap = await getDoc(inviterRef);
            if(inviterSnap.exists()) {
                await updateDoc(inviterRef, { coins: inviterSnap.data().coins + 500 });
            }
        }

        window.handleTap = async (e) => {
            user.coins++;
            updateUI();
            createPlusOne(e);
            await updateDoc(doc(db, "users", uid), { coins: user.coins });
        };

        function syncTasks() {
            onSnapshot(collection(db, "tasks"), (snap) => {
                const list = document.getElementById('task-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const t = d.data();
                    list.innerHTML += `<div class="bg-gray-900 p-4 rounded-xl flex justify-between items-center border border-gray-800 text-xs">
                        <div><p class="font-bold">${t.name}</p><p class="text-green-500">+${t.reward} Coins</p></div>
                        <button onclick="window.open('${t.link}', '_blank'); completeTask('${d.id}', ${t.reward})" class="bg-blue-600 px-4 py-1 rounded-full font-bold">Join</button>
                    </div>`;
                });
            });
        }

        window.completeTask = async (tid, reward) => {
            user.coins += reward;
            updateUI();
            await updateDoc(doc(db, "users", uid), { coins: user.coins });
            alert("Reward claimed!");
        };

        window.requestWithdrawal = async () => {
            const addr = document.getElementById('wallet-addr').value;
            if(user.coins < 10000) return alert("Min 10,000 coins required!");
            await addDoc(collection(db, "withdrawals"), { uid, name: user.name, address: addr, amount: user.coins, status: "Pending" });
            alert("Requested!");
        };

        function syncHistory() {
            onSnapshot(query(collection(db, "withdrawals"), where("uid", "==", uid)), (snap) => {
                const div = document.getElementById('history');
                div.innerHTML = "";
                snap.forEach(d => {
                    const w = d.data();
                    div.innerHTML += `<div class="bg-black p-2 rounded flex justify-between text-[10px]">
                        <span>${w.amount} Coins</span><span class="font-bold uppercase">${w.status}</span>
                    </div>`;
                });
            });
        }

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        function updateUI() {
            document.getElementById('balance').innerText = user.coins.toLocaleString();
            document.getElementById('level').innerText = Math.floor(user.coins / 1000) + 1;
        }

        function createPlusOne(e) {
            const p = document.createElement("div");
            p.className = "plus-animation";
            p.style.left = e.clientX + "px"; p.style.top = e.clientY + "px";
            p.innerText = "+1"; document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }

        window.copyRef = () => {
            const link = document.getElementById('ref-link');
            link.select(); document.execCommand('copy'); alert("Link Copied!");
        };

        init();
    </script>
</body>
</html>
